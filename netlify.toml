[build]
  command = "echo ok"
  publish = "dist"

# Proxy toutes les requêtes /api/* vers le backend Render
[[redirects]]
  from = "/api/*"
  to = "https://autotrade-sniper.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
